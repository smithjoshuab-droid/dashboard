name: Refresh Dashboard

on:
  schedule:
    # 9:00 AM CST = 15:00 UTC
    - cron: '0 15 * * 1-5'
    # 12:00 PM CST = 18:00 UTC
    - cron: '0 18 * * 1-5'
    # 4:00 PM CST = 22:00 UTC
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl Office365-REST-Python-Client

      - name: Download spreadsheet from SharePoint
        env:
          SHAREPOINT_FILE_URL: ${{ secrets.SHAREPOINT_FILE_URL }}
          SHAREPOINT_USER: ${{ secrets.SHAREPOINT_USER }}
          SHAREPOINT_PASS: ${{ secrets.SHAREPOINT_PASS }}
        run: python download_spreadsheet.py

      - name: Rebuild dashboard
        run: python build_dashboard.py

      - name: Commit updated dashboard
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "dashboard-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard refresh $(date +'%Y-%m-%d %H:%M')"
          git push
